<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1f"/>
      <stop offset="100%" stop-color="#040818"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1000" height="360" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#1a2040" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="90" x2="1000" y2="90"/>
    <line x1="0" y1="180" x2="1000" y2="180"/>
    <line x1="0" y1="270" x2="1000" y2="270"/>
    <line x1="250" y1="0" x2="250" y2="360"/>
    <line x1="500" y1="0" x2="500" y2="360"/>
    <line x1="750" y1="0" x2="750" y2="360"/>
  </g>

  <!-- 4 Buckets -->
  <!-- Working Directory -->
  <g>
    <rect x="40" y="130" width="160" height="100" rx="12" fill="#0a1230" stroke="#00e5ff" stroke-width="3"/>
    <text x="120" y="170" text-anchor="middle" fill="#00e5ff" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="700">Working Dir</text>
    <text x="120" y="195" text-anchor="middle" fill="#9CA3AF" font-family="Arial" font-size="13">your files</text>
    <circle cx="120" cy="215" r="4" fill="#00e5ff">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Staging Area -->
  <g>
    <rect x="260" y="130" width="160" height="100" rx="12" fill="#0a1230" stroke="#ffb300" stroke-width="3"/>
    <text x="340" y="170" text-anchor="middle" fill="#ffb300" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="700">Staging</text>
    <text x="340" y="195" text-anchor="middle" fill="#9CA3AF" font-family="Arial" font-size="13">git add</text>
    <circle cx="340" cy="215" r="4" fill="#ffb300">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Local Repo -->
  <g>
    <rect x="480" y="130" width="160" height="100" rx="12" fill="#0a1230" stroke="#a855f7" stroke-width="3"/>
    <text x="560" y="170" text-anchor="middle" fill="#a855f7" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="700">Local Repo</text>
    <text x="560" y="195" text-anchor="middle" fill="#9CA3AF" font-family="Arial" font-size="13">git commit</text>
    <circle cx="560" cy="215" r="4" fill="#a855f7">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Remote Repo -->
  <g>
    <rect x="700" y="130" width="160" height="100" rx="12" fill="#0a1230" stroke="#10e891" stroke-width="3"/>
    <text x="780" y="170" text-anchor="middle" fill="#10e891" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="700">Remote</text>
    <text x="780" y="195" text-anchor="middle" fill="#9CA3AF" font-family="Arial" font-size="13">GitHub</text>
    <circle cx="780" cy="215" r="4" fill="#10e891">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Arrows connecting buckets -->
  <g stroke="#334155" stroke-width="2" fill="none">
    <line x1="200" y1="180" x2="260" y2="180" marker-end="url(#arrow)"/>
    <line x1="420" y1="180" x2="480" y2="180" marker-end="url(#arrow)"/>
    <line x1="640" y1="180" x2="700" y2="180" marker-end="url(#arrow)"/>
  </g>

  <!-- Command labels above arrows -->
  <text x="230" y="165" text-anchor="middle" fill="#ffb300" font-family="JetBrains Mono, Courier New, monospace" font-size="11" font-weight="700">add</text>
  <text x="450" y="165" text-anchor="middle" fill="#a855f7" font-family="JetBrains Mono, Courier New, monospace" font-size="11" font-weight="700">commit</text>
  <text x="670" y="165" text-anchor="middle" fill="#10e891" font-family="JetBrains Mono, Courier New, monospace" font-size="11" font-weight="700">push</text>

  <!-- Traveling packet (animates along the whole path) -->
  <circle r="8" fill="#ffffff" filter="url(#glow)">
    <animateMotion dur="6s" repeatCount="indefinite" keyPoints="0;0.25;0.5;0.75;1" keyTimes="0;0.25;0.5;0.75;1" calcMode="linear">
      <mpath href="#travelPath"/>
    </animateMotion>
    <animate attributeName="fill" values="#00e5ff;#ffb300;#a855f7;#10e891;#00e5ff" dur="6s" repeatCount="indefinite"/>
  </circle>
  <path id="travelPath" d="M 120 180 L 340 180 L 560 180 L 780 180" fill="none" stroke="none"/>

  <!-- Return arrow (pull) -->
  <path d="M 780 250 Q 780 310 450 310 Q 120 310 120 250" fill="none" stroke="#10e891" stroke-width="2" stroke-dasharray="6,4" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="0" to="20" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <text x="450" y="335" text-anchor="middle" fill="#10e891" font-family="JetBrains Mono, Courier New, monospace" font-size="12" font-weight="700">git pull / git fetch</text>

  <!-- Title -->
  <text x="500" y="50" text-anchor="middle" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="800">Git's 4 Buckets — Where Your Code Lives</text>
  <text x="500" y="78" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="14">every git command moves code between these</text>
</svg>
