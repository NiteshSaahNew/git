<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1f"/>
      <stop offset="100%" stop-color="#040818"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="360" fill="url(#bg5)"/>

  <text x="500" y="45" text-anchor="middle" fill="#ffffff" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="800">git stash — Save Work for Later</text>
  <text x="500" y="72" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="14">shelve your in-progress code, switch context, come back later</text>

  <!-- Working Directory box -->
  <rect x="80" y="130" width="220" height="180" rx="12" fill="#0a1230" stroke="#00e5ff" stroke-width="3"/>
  <text x="190" y="160" text-anchor="middle" fill="#00e5ff" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="700">Working Dir</text>

  <!-- WIP files (animate disappearing) -->
  <g>
    <rect x="110" y="180" width="160" height="24" rx="4" fill="#1a2040" stroke="#ffb300">
      <animate attributeName="opacity" values="1;1;0;0;1;1" keyTimes="0;0.2;0.3;0.7;0.8;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="120" y="197" fill="#ffb300" font-family="JetBrains Mono, Courier New, monospace" font-size="12">login.js (WIP)
      <animate attributeName="opacity" values="1;1;0;0;1;1" keyTimes="0;0.2;0.3;0.7;0.8;1" dur="5s" repeatCount="indefinite"/>
    </text>
  </g>
  <g>
    <rect x="110" y="215" width="160" height="24" rx="4" fill="#1a2040" stroke="#ffb300">
      <animate attributeName="opacity" values="1;1;0;0;1;1" keyTimes="0;0.2;0.3;0.7;0.8;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="120" y="232" fill="#ffb300" font-family="JetBrains Mono, Courier New, monospace" font-size="12">auth.js (WIP)
      <animate attributeName="opacity" values="1;1;0;0;1;1" keyTimes="0;0.2;0.3;0.7;0.8;1" dur="5s" repeatCount="indefinite"/>
    </text>
  </g>
  <g>
    <rect x="110" y="250" width="160" height="24" rx="4" fill="#1a2040" stroke="#64748b"/>
    <text x="120" y="267" fill="#64748b" font-family="JetBrains Mono, Courier New, monospace" font-size="12">prod-hotfix.js</text>
  </g>

  <!-- Stash box -->
  <rect x="700" y="130" width="220" height="180" rx="12" fill="#0a1230" stroke="#a855f7" stroke-width="3"/>
  <text x="810" y="160" text-anchor="middle" fill="#a855f7" font-family="Montserrat, Arial, sans-serif" font-size="16" font-weight="700">Stash Stack</text>

  <!-- Stashed items (animate appearing) -->
  <g>
    <rect x="730" y="180" width="160" height="24" rx="4" fill="#1a0a2a" stroke="#a855f7" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2;0.3;0.7;0.8;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="740" y="197" fill="#c384fa" font-family="JetBrains Mono, Courier New, monospace" font-size="11" opacity="0">
      stash@{0} WIP login
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2;0.3;0.7;0.8;1" dur="5s" repeatCount="indefinite"/>
    </text>
  </g>
  <g>
    <rect x="730" y="215" width="160" height="24" rx="4" fill="#1a0a2a" stroke="#a855f7" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2;0.3;0.7;0.8;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="740" y="232" fill="#c384fa" font-family="JetBrains Mono, Courier New, monospace" font-size="11" opacity="0">
      stash@{0} WIP auth
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2;0.3;0.7;0.8;1" dur="5s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Arrows -->
  <g>
    <path d="M 310 220 L 690 220" stroke="#ffb300" stroke-width="2" fill="none" marker-end="url(#arrowY)" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2;0.28;0.35;0.4;1" dur="5s" repeatCount="indefinite"/>
    </path>
    <text x="500" y="212" text-anchor="middle" fill="#ffb300" font-family="JetBrains Mono, Courier New, monospace" font-size="12" font-weight="700" opacity="0">
      git stash
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.2;0.28;0.35;0.4;1" dur="5s" repeatCount="indefinite"/>
    </text>
  </g>

  <g>
    <path d="M 690 250 L 310 250" stroke="#10e891" stroke-width="2" fill="none" marker-end="url(#arrowG)" opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.6;0.7;0.75;0.8;0.95;1" dur="5s" repeatCount="indefinite"/>
    </path>
    <text x="500" y="272" text-anchor="middle" fill="#10e891" font-family="JetBrains Mono, Courier New, monospace" font-size="12" font-weight="700" opacity="0">
      git stash pop
      <animate attributeName="opacity" values="0;0;0;0;1;1;0" keyTimes="0;0.6;0.7;0.75;0.8;0.95;1" dur="5s" repeatCount="indefinite"/>
    </text>
  </g>

  <defs>
    <marker id="arrowY" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffb300"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10e891"/>
    </marker>
  </defs>
</svg>
